# ═══════════════════════════════════════════════════════════════
# ResQ Plate — Application Configuration
# ═══════════════════════════════════════════════════════════════

# ── Server ──────────────────────────────────────────────────────
server.port=8080

# ── Database (PostgreSQL) ────────────────────────────────────────
# Run first: CREATE DATABASE resqplate; in psql
spring.datasource.url=jdbc:postgresql://localhost:5432/resqplate
spring.datasource.username=postgres
spring.datasource.password=Root@123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ──────────────────────────────────────────────────────────
# Generate your own 256-bit Base64 key. This is a DEMO key only.
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=86400000

# ── Spring AI — Groq (OpenAI Compatible) ──────────────────────────
# Point to Groq's high-performance endpoint
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai/v1
spring.ai.openai.chat.options.model=llama-3.1-70b-versatile
# Re-enable Spring AI autoconfiguration
spring.ai.openai.chat.enabled=true

# ── Email (Gmail SMTP) ────────────────────────────────────────────
# Create an App Password at: https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=manish402699@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── File Storage ──────────────────────────────────────────────────
resq.reports.dir=./reports
resq.qr.base-url=http://localhost:8080

# ── WebSocket ─────────────────────────────────────────────────────
# Allowed origins for WebSocket connections (React dev servers)
resq.websocket.allowed-origins=http://localhost:3000,http://localhost:5173

# ── Logging ───────────────────────────────────────────────────────
logging.level.com.resq=DEBUG
logging.level.org.springframework.ai=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web.socket=INFO